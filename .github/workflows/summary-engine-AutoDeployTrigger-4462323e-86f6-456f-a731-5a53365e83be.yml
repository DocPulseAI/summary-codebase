name: Trigger auto deployment for summary-engine

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches:
      - epic-4
    paths:
      - "**"
      - ".github/workflows/summary-engine-AutoDeployTrigger-4462323e-86f6-456f-a731-5a53365e83be.yml"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SUMMARYENGINE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SUMMARYENGINE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SUMMARYENGINE_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: docpulseresgistry.azurecr.io
          username: ${{ secrets.SUMMARYENGINE_REGISTRY_USERNAME }}
          password: ${{ secrets.SUMMARYENGINE_REGISTRY_PASSWORD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/epic-4
          file: ${{ github.workspace }}/epic-4/Dockerfile
          push: true
          tags: docpulseresgistry.azurecr.io/summary-engine:latest

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az containerapp registry set \
              --name summary-engine \
              --resource-group DocPulse \
              --server docpulseresgistry.azurecr.io \
              --username ${{ secrets.SUMMARYENGINE_REGISTRY_USERNAME }} \
              --password ${{ secrets.SUMMARYENGINE_REGISTRY_PASSWORD }}

            az containerapp update \
              --name summary-engine \
              --resource-group DocPulse \
              --image docpulseresgistry.azurecr.io/summary-engine:latest \
              --revision-suffix "r$(date +%s)"

            az containerapp show \
              --name summary-engine \
              --resource-group DocPulse \
              --query 'properties.latestRevisionFqdn' \
              -o tsv
