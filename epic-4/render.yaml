services:
  - type: web
    name: epic4-docs-automation
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # GitHub Configuration
      - key: GITHUB_TOKEN
        sync: false
      - key: REPO_OWNER
        sync: false
      - key: REPO_NAME
        sync: false
      - key: TARGET_BRANCH
        value: main

      # Azure Blob Storage Configuration (Optional - for cloud storage)
      - key: AZURE_STORAGE_CONNECTION_STRING
        sync: false
      - key: AZURE_STORAGE_ACCOUNT_URL
        sync: false
      - key: AZURE_STORAGE_ACCOUNT_KEY
        sync: false
      - key: AZURE_CONTAINER_NAME
        sync: false
      - key: DOCS_BUCKET_PATH
        sync: false

      # Python Configuration
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
    disk:
      name: artifacts
      mountPath: /app/artifacts
      sizeGB: 1
